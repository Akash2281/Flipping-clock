<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flip Clock - Working</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0a0c12;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Arial", sans-serif;
        padding: 20px;
        transition: background 0.3s;
      }

      .container {
        width: 100%;
        max-width: 1200px;
      }

      .clock-box {
        background: rgba(20, 25, 35, 0.9);
        backdrop-filter: blur(10px);
        border-radius: 60px;
        padding: 40px;
        box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8);
        border-bottom: 3px solid #3a4055;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        padding: 0 20px;
      }

      .menu-btn {
        background: #1e2638;
        color: #aab9ff;
        font-size: 28px;
        line-height: 1;
        padding: 5px 20px;
        border-radius: 40px;
        cursor: pointer;
        box-shadow:
          inset 0 -3px 0 #0b0f1a,
          0 5px 10px black;
        border: 1px solid #3f4a66;
        user-select: none;
      }

      .ampm {
        background: #1e2638;
        color: #aac3ff;
        font-size: 24px;
        font-weight: bold;
        padding: 8px 25px;
        border-radius: 40px;
        box-shadow:
          inset 0 -3px 0 #0b0f1a,
          0 5px 10px black;
        border: 1px solid #3f4a66;
      }

      .fullscreen {
        background: #1e2638;
        color: #aab9ff;
        font-size: 28px;
        width: 60px;
        height: 60px;
        border-radius: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow:
          inset 0 -3px 0 #0b0f1a,
          0 5px 10px black;
        border: 1px solid #3f4a66;
      }

      /* FLIP CLOCK */
      .flip-clock {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin: 30px 0;
        flex-wrap: wrap;
      }

      .digit-block {
        position: relative;
        width: 100px;
        height: 140px;
        background: #1a1f2c;
        border-radius: 20px;
        box-shadow:
          0 15px 20px black,
          inset 0 -3px 5px #2f364a,
          inset 0 3px 5px #454f6b;
      }

      .top-flap,
      .bottom-flap {
        position: absolute;
        left: 0;
        width: 100%;
        height: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 80px;
        font-weight: bold;
        color: #f0f6ff;
        text-shadow: 0 5px 8px black;
        overflow: hidden;
        backface-visibility: hidden;
      }

      .top-flap {
        top: 0;
        border-radius: 18px 18px 5px 5px;
        align-items: flex-start;
        padding-top: 15px;
        background: #1a1f2c;
        border-bottom: 2px solid #38405a;
        box-shadow: inset 0 8px 8px -5px black;
      }

      .bottom-flap {
        bottom: 0;
        border-radius: 5px 5px 18px 18px;
        align-items: flex-end;
        padding-bottom: 15px;
        background: #151b27;
        border-top: 2px solid #2b3245;
        box-shadow: inset 0 -8px 8px -5px black;
      }

      .moving-flap {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 50%;
        background: #1a1f2c;
        border-radius: 18px 18px 5px 5px;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding-top: 15px;
        font-size: 80px;
        font-weight: bold;
        color: #f0f6ff;
        text-shadow: 0 5px 8px black;
        transform-origin: bottom center;
        backface-visibility: hidden;
        border-bottom: 2px solid #3d4663;
        box-shadow:
          inset 0 8px 8px -5px black,
          0 5px 10px black;
        pointer-events: none;
      }

      .separator {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin: 0 5px;
      }

      .dot {
        width: 15px;
        height: 15px;
        background: #2a3248;
        border-radius: 50%;
        box-shadow:
          inset 0 -3px 3px #0f131e,
          0 3px 5px black;
        border: 1px solid #475174;
      }

      @keyframes flip {
        0% {
          transform: rotateX(0deg);
        }
        100% {
          transform: rotateX(-90deg);
        }
      }

      .flipping {
        animation: flip 0.2s ease-in forwards;
      }

      .hidden-top {
        opacity: 0;
      }

      /* FEATURE PANEL */
      .panel {
        background: rgba(25, 30, 42, 0.98);
        backdrop-filter: blur(10px);
        border-radius: 40px;
        margin-top: 30px;
        padding: 30px;
        border: 1px solid #49537a;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        color: white;
      }

      .section {
        background: #1f273b;
        border-radius: 30px;
        padding: 20px;
        box-shadow:
          inset 0 1px 3px #58658b,
          0 10px 15px black;
      }

      .section h3 {
        color: #adc0ff;
        margin-bottom: 15px;
        font-size: 20px;
        border-left: 4px solid #6f8cff;
        padding-left: 15px;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 10px 0;
        align-items: center;
      }

      button,
      .file-label,
      select,
      input[type="color"] {
        background: #2d364f;
        color: white;
        border: 1px solid #6575a8;
        padding: 8px 16px;
        border-radius: 30px;
        font-size: 14px;
        cursor: pointer;
        box-shadow: 0 5px 8px black;
        transition: 0.1s;
      }

      button:active,
      .file-label:active {
        transform: scale(0.95);
        background: #3d4a6b;
      }

      input[type="color"] {
        width: 50px;
        height: 45px;
        padding: 3px;
      }

      select {
        min-width: 150px;
      }

      input[type="range"] {
        width: 120px;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 700px) {
        .digit-block {
          width: 70px;
          height: 100px;
        }
        .top-flap,
        .bottom-flap,
        .moving-flap {
          font-size: 55px;
        }
        .ampm {
          font-size: 18px;
          padding: 5px 15px;
        }
      }
    </style>

    <script>
      // ========== SIMPLE, WORKING FLIP CLOCK ==========

      // Get current time
      function getCurrentTime() {
        const now = new Date();
        let hours = now.getHours();
        let ampm = hours >= 12 ? "PM" : "AM";
        hours = hours % 12 || 12;

        return {
          h1: Math.floor(hours / 10) || 0,
          h2: hours % 10,
          m1: Math.floor(now.getMinutes() / 10),
          m2: now.getMinutes() % 10,
          s1: Math.floor(now.getSeconds() / 10),
          s2: now.getSeconds() % 10,
          ampm: ampm,
        };
      }

      // Store current state
      let clockState = {
        h1: 0,
        h2: 0,
        m1: 0,
        m2: 0,
        s1: 0,
        s2: 0,
      };

      // DOM elements
      const digits = ["h1", "h2", "m1", "m2", "s1", "s2"];
      const elements = {};

      digits.forEach((id) => {
        elements[id] = {
          top: document.getElementById(id + "top"),
          bottom: document.getElementById(id + "bottom"),
          moving: document.getElementById(id + "moving"),
        };
      });

      const ampmEl = document.getElementById("ampmDisplay");

      // Update display immediately
      function updateDisplay() {
        const time = getCurrentTime();

        digits.forEach((id) => {
          if (elements[id].top) {
            elements[id].top.textContent = time[id];
            elements[id].bottom.textContent = time[id];
            elements[id].moving.textContent = time[id];
            clockState[id] = time[id];
          }
        });

        ampmEl.textContent = time.ampm;
      }

      // Flip animation for a digit
      function flipDigit(id, newValue) {
        const oldValue = clockState[id];
        if (oldValue == newValue) return;

        const el = elements[id];
        if (!el || !el.top || !el.moving) return;

        // Set moving flap to old value and animate
        el.moving.textContent = oldValue;
        el.moving.classList.remove("flipping");
        void el.moving.offsetWidth; // Force reflow

        // Hide top static briefly
        el.top.classList.add("hidden-top");

        // Start animation
        el.moving.classList.add("flipping");

        // After animation completes
        setTimeout(() => {
          el.top.textContent = newValue;
          el.bottom.textContent = newValue;
          el.top.classList.remove("hidden-top");
          el.moving.classList.remove("flipping");
          el.moving.textContent = newValue;
          clockState[id] = newValue;
        }, 180);
      }

      // Update clock with animations
      function tick() {
        const time = getCurrentTime();

        digits.forEach((id) => {
          if (clockState[id] != time[id]) {
            flipDigit(id, time[id]);
          }
        });

        ampmEl.textContent = time.ampm;
      }

      // Initialize
      updateDisplay();

      // Start ticking every second
      setInterval(tick, 1000);

      // Also sync with actual seconds
      setTimeout(() => {
        const now = new Date();
        setTimeout(tick, 1000 - now.getMilliseconds());
      }, 0);

          <div class="row">
            <span>Stretch:</span>
            <input type="range" id="fontStretch" min="0.5" max="2" step="0.1" value="1" oninput="document.querySelectorAll('.top-flap, .bottom-flap, .moving-flap').forEach(el => el.style.transform='scaleX('+this.value+')')">
          </div>
        </div>
        
        <div class="section">
          <h3>✨ Effects (50+)</h3>
          <div class="row" style="display:flex; flex-wrap:wrap; gap:5px;">
            ${effects.map((e) => `<button style="flex:1 0 auto;" onclick="document.querySelectorAll('.top-flap, .bottom-flap, .moving-flap').forEach(el => el.style.textShadow='${effectStyles[e]}')">${e}</button>`).join("")}
          </div>
          <div class="row">
            <button onclick="document.querySelectorAll('.top-flap, .bottom-flap, .moving-flap').forEach(el => el.style.textShadow='0 5px 8px black')">Reset Effect</button>
          </div>
        </div>
        
        <div class="section">
          <h3>⏰ Alarm</h3>
          <div class="row">
            <input type="time" id="alarmTime" value="08:00">
            <button onclick="setAlarm()">Set</button>
            <button onclick="clearAlarm()">Stop</button>
          </div>
        </div>
        
        <div class="section">
          <h3>⏱️ Timer</h3>
          <div class="row">
            <input type="number" id="timerMins" value="5" min="1" max="120">
            <button onclick="startTimer()">Start</button>
            <button onclick="stopTimer()">Pause</button>
          </div>
          <div class="row">
            <span>Break:</span>
            <input type="number" id="breakMins" value="2" min="1" max="30">
            <button onclick="setBreak()">Apply</button>
          </div>
        </div>
      `;

        panel.innerHTML = html;
      }

      // Global functions for panel
      window.applyFont = function (font) {
        document
          .querySelectorAll(".top-flap, .bottom-flap, .moving-flap")
          .forEach((el) => {
            el.style.fontFamily = font;
          });
      };

      window.previewFont = function (font) {
        document
          .querySelectorAll(".top-flap, .bottom-flap, .moving-flap")
          .forEach((el) => {
            el.style.fontFamily = font;
          });
      };

      window.applyImage = function (input) {
        if (input.files && input.files[0]) {
          const url = URL.createObjectURL(input.files[0]);
          document.body.style.backgroundImage = `url(${url})`;
          document.body.style.backgroundSize = "cover";
          document.getElementById("bgVideo").style.display = "none";
        }
      };

      window.applyVideo = function (input) {
        if (input.files && input.files[0]) {
          const video = document.getElementById("bgVideo");
          video.src = URL.createObjectURL(input.files[0]);
          video.style.display = "block";
          video.play();
          document.body.style.background = "";
          document.body.style.backgroundImage = "";
        }
      };

      // Alarm
      let alarmInterval = null;
      window.setAlarm = function () {
        const time = document.getElementById("alarmTime").value;
        if (!time) return;
        const [hours, mins] = time.split(":").map(Number);

        if (alarmInterval) clearInterval(alarmInterval);

        alarmInterval = setInterval(() => {
          const now = new Date();
          if (
            now.getHours() === hours &&
            now.getMinutes() === mins &&
            now.getSeconds() === 0
          ) {
            alert("⏰ ALARM!");
            // Simple beep
            try {
              const audio = new AudioContext();
              const osc = audio.createOscillator();
              osc.connect(audio.destination);
              osc.start();
              osc.stop(audio.currentTime + 0.5);
            } catch (e) {}
          }
        }, 1000);
      };

      window.clearAlarm = function () {
        if (alarmInterval) clearInterval(alarmInterval);
      };

      // Timer
      let timerInterval = null;
      let timerRemaining = 0;
      let breakDuration = 2;

      window.setBreak = function () {
        breakDuration =
          parseInt(document.getElementById("breakMins").value) || 2;
      };

      window.startTimer = function () {
        const mins = parseInt(document.getElementById("timerMins").value) || 5;
        timerRemaining = mins * 60;

        if (timerInterval) clearInterval(timerInterval);

        timerInterval = setInterval(() => {
          if (timerRemaining <= 0) {
            clearInterval(timerInterval);
            alert("⏳ Timer done! Take a break.");
            timerRemaining = breakDuration * 60;
          } else {
            timerRemaining--;
          }
        }, 1000);
      };

      window.stopTimer = function () {
        if (timerInterval) clearInterval(timerInterval);
      };

      // Menu toggle
      menuBtn.addEventListener("click", () => {
        panelOpen = !panelOpen;
        if (panelOpen) {
          buildPanel();
          panel.style.display = "grid";
        } else {
          panel.style.display = "none";
        }
      });

      // Fullscreen
      document.getElementById("fullscreenBtn").addEventListener("click", () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
      });
    </script>
  </body>
</html>
